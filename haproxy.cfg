#------------------------------------------------------------------------------
# haproxy.cfg — NL-SQL MCP tier load balancer
#
# Fronts two backend groups:
#   oracle-mcp  — one or more Oracle MCP server replicas (:8001)
#   neo4j-mcp   — one or more Neo4j  MCP server replicas (:8002)
#
# Both MCP servers now run Streamable HTTP with stateless_http=True.
# Because the server holds no per-connection session state, any request
# can land on any replica — plain round-robin is sufficient and correct.
# No sticky-session / source-IP hashing is needed.
#
# Health checking strategy (two levels):
#   Liveness  — HTTP GET /health  every 2s.  Fast, no DB query.
#               A replica failing this is removed from rotation immediately.
#   Readiness — HTTP GET /ready   every 10s. Slower; actually acquires a
#               real Oracle/Neo4j connection. Used as the inter-check during
#               startup so traffic is only sent to a replica that has
#               successfully connected to its backing store.
#
# Topology this config assumes (adjust server lines for your real IPs):
#
#   HAProxy listens on :7001 (oracle) and :7002 (neo4j).
#   FastAPI backend sends MCP calls to these VIPs instead of directly to
#   individual replica ports.  Update ORACLE_MCP_URL / NEO4J_MCP_URL in
#   .env accordingly:
#       ORACLE_MCP_URL=http://haproxy-host:7001
#       NEO4J_MCP_URL=http://haproxy-host:7002
#
# Scaling horizontally:
#   Add more "server oracle-N ..." lines to the backend sections.
#   No config change is needed on the MCP servers themselves.
#
# Stats UI:
#   http://haproxy-host:8404/stats  (user: admin / password set below)
#------------------------------------------------------------------------------

global
    log         /dev/log local0
    log         /dev/log local1 notice
    maxconn     4096
    user        haproxy
    group       haproxy
    daemon

    # TLS tuning (used if you terminate TLS here)
    tune.ssl.default-dh-param  2048
    ssl-default-bind-ciphers   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
    ssl-default-bind-options   ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull

    # Timeouts tuned for long-running MCP tool calls (execute_query on
    # heavy Oracle queries can take tens of seconds).
    timeout connect   5s
    timeout client   120s
    timeout server   120s

    # Retry a request on a different server if the chosen server refuses
    # the connection (e.g. crashed between health check and request).
    retries          3
    option           redispatch

    # Trim the X-Forwarded-For header and re-add it so MCP servers see the
    # real client IP in logs (useful for audit trails later).
    option           forwardfor

    # Return a clean 503 page on backend failure instead of an empty TCP reset.
    errorfile 503 /etc/haproxy/errors/503.http

#------------------------------------------------------------------------------
# Stats / management UI
#------------------------------------------------------------------------------

listen stats
    bind  *:8404
    stats enable
    stats uri     /stats
    stats realm   "NL-SQL HAProxy"
    stats auth    admin:changeme          # CHANGE in production
    stats refresh 5s
    stats show-legends
    stats show-node

#------------------------------------------------------------------------------
# Oracle MCP  —  VIP on :7001
#------------------------------------------------------------------------------

frontend oracle-mcp-front
    bind  *:7001
    default_backend  oracle-mcp-back

    # Log slow requests (>5s) at WARNING level for capacity planning
    capture request header User-Agent len 32
    acl slow_request  sc_http_req_rate(0) gt 50
    http-request  track-sc0 src

backend oracle-mcp-back
    balance  roundrobin

    # Active health check: liveness probe (/health) every 2 seconds.
    # A server is marked DOWN after 3 consecutive failures and brought
    # back after 2 consecutive successes.
    option  httpchk GET /health
    http-check  expect status 200
    default-server  inter 2s  fastinter 500ms  downinter 5s \
                    rise 2  fall 3  \
                    on-marked-down shutdown-sessions

    # Readiness probe runs as the inter-check on startup only:
    # the check-uri below overrides the health endpoint for the initial probe.
    # (HAProxy doesn't natively support two separate check URIs; use the
    #  /ready endpoint in a monitoring system like Nagios / Prometheus for
    #  the deeper check — or add a secondary agent-check block below.)

    # Add one line per replica.  Replace host/port with your actual IPs.
    server  oracle-mcp-1  127.0.0.1:8001  check
    server  oracle-mcp-2  127.0.0.1:8011  check   # second replica example
    # server  oracle-mcp-3  10.0.1.13:8001  check  # third replica example

    # Connection limits — align with ORACLE_POOL_MAX on each replica.
    # If each replica has ORACLE_POOL_MAX=8 and you have 2 replicas, the
    # effective ceiling is 16 concurrent Oracle connections across the tier.
    # HAProxy won't enforce this automatically; set maxconn per server if
    # you want to cap at the replica's pool ceiling:
    # server  oracle-mcp-1  127.0.0.1:8001  check  maxconn 8

    # Slow-start: ramp up traffic to a newly recovered server over 30s
    # to avoid sending a burst of cold requests to a replica whose Oracle
    # pool is still warming up.
    default-server  slowstart 30s

#------------------------------------------------------------------------------
# Neo4j MCP  —  VIP on :7002
#------------------------------------------------------------------------------

frontend neo4j-mcp-front
    bind  *:7002
    default_backend  neo4j-mcp-back

backend neo4j-mcp-back
    balance  roundrobin

    option  httpchk GET /health
    http-check  expect status 200
    default-server  inter 2s  fastinter 500ms  downinter 5s \
                    rise 2  fall 3  \
                    slowstart 30s \
                    on-marked-down shutdown-sessions

    server  neo4j-mcp-1  127.0.0.1:8002  check
    server  neo4j-mcp-2  127.0.0.1:8012  check   # second replica example
