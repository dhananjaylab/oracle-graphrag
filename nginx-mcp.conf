# nginx-mcp.conf — alternative to HAProxy for teams already running nginx
#
# Two upstream groups mirror the HAProxy backends.
# Nginx's upstream health checks require nginx Plus (commercial).
# For OSS nginx, passive failure detection (proxy_next_upstream) is used
# instead — it retries on connection failure / 502 / 503 / 504.
# For active health checks on OSS nginx, add nginx_upstream_check_module
# (openresty/tengine) or use a sidecar health-check tool (e.g. healthcheck-nginx).
#
# Put this file in /etc/nginx/conf.d/ or include from nginx.conf.

upstream oracle_mcp {
    # least_conn distributes by active connections, which works better than
    # round-robin when individual tool calls have variable duration.
    least_conn;

    server 127.0.0.1:8001;
    server 127.0.0.1:8011;     # second replica
    # server 10.0.1.13:8001;   # third replica on another host

    keepalive 32;              # reuse upstream connections; cuts per-request
                               # TCP handshake cost for the Streamable HTTP
                               # client's persistent connection pool
}

upstream neo4j_mcp {
    least_conn;

    server 127.0.0.1:8002;
    server 127.0.0.1:8012;

    keepalive 32;
}

# Oracle MCP VIP — listens on :7001
server {
    listen 7001;
    server_name _;

    # Pass real client IP through to MCP server logs
    proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header  X-Real-IP         $remote_addr;
    proxy_set_header  Host              $host;

    # Timeouts: long enough for heavy Oracle queries (120s matches HAProxy)
    proxy_connect_timeout  5s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;

    # Retry on connection-refused / bad-gateway / gateway-timeout only
    # (not on non-idempotent methods like POST by default in nginx — MCP
    # tool calls are POST, so retry only on connection failure, not on
    # application-level errors, to avoid double-executing a query).
    proxy_next_upstream  error timeout;
    proxy_next_upstream_tries  2;

    # MCP protocol endpoint
    location /mcp {
        proxy_pass         http://oracle_mcp;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";   # keep upstream keepalive working
    }

    # Health / readiness probes — proxied through to the replica's own routes
    location /health {
        proxy_pass  http://oracle_mcp;
        proxy_http_version 1.1;
    }

    location /ready {
        proxy_pass  http://oracle_mcp;
        proxy_http_version 1.1;
    }

    # nginx-level health endpoint for the load balancer itself
    location /nginx-health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
        access_log off;
    }
}

# Neo4j MCP VIP — listens on :7002
server {
    listen 7002;
    server_name _;

    proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header  X-Real-IP         $remote_addr;
    proxy_set_header  Host              $host;

    proxy_connect_timeout  5s;
    proxy_send_timeout    120s;
    proxy_read_timeout    120s;
    proxy_next_upstream    error timeout;
    proxy_next_upstream_tries  2;

    location /mcp {
        proxy_pass         http://neo4j_mcp;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
    }

    location /health {
        proxy_pass  http://neo4j_mcp;
        proxy_http_version 1.1;
    }

    location /ready {
        proxy_pass  http://neo4j_mcp;
        proxy_http_version 1.1;
    }

    location /nginx-health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
        access_log off;
    }
}
