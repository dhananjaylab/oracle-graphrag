# haproxy-compose.cfg
# Docker-Compose variant of haproxy.cfg.
# Uses Docker service names instead of IP addresses so service discovery
# is handled by Docker's embedded DNS.

global
    log   stdout  format raw  local0  info
    maxconn 4096

defaults
    log       global
    mode      http
    option    httplog
    option    dontlognull
    timeout   connect  5s
    timeout   client  120s
    timeout   server  120s
    retries   3
    option    redispatch
    option    forwardfor

listen stats
    bind  *:8404
    stats enable
    stats uri  /stats
    stats auth admin:changeme
    stats refresh 5s

frontend oracle-mcp-front
    bind *:7001
    default_backend oracle-mcp-back

backend oracle-mcp-back
    balance     roundrobin
    option      httpchk GET /health
    http-check  expect status 200
    default-server inter 2s fastinter 500ms downinter 5s rise 2 fall 3 slowstart 30s

    # Docker service names resolve via embedded DNS
    server oracle-mcp-1  oracle-mcp-1:8001  check  resolvers docker  init-addr libc,none
    server oracle-mcp-2  oracle-mcp-2:8001  check  resolvers docker  init-addr libc,none

frontend neo4j-mcp-front
    bind *:7002
    default_backend neo4j-mcp-back

backend neo4j-mcp-back
    balance     roundrobin
    option      httpchk GET /health
    http-check  expect status 200
    default-server inter 2s fastinter 500ms downinter 5s rise 2 fall 3 slowstart 30s

    server neo4j-mcp-1  neo4j-mcp-1:8002  check  resolvers docker  init-addr libc,none
    server neo4j-mcp-2  neo4j-mcp-2:8002  check  resolvers docker  init-addr libc,none

resolvers docker
    nameserver dns1  127.0.0.11:53
    resolve_retries  3
    timeout retry  1s
    hold valid     10s
